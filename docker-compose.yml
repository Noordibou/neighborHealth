services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: neighborhealth
      POSTGRES_PASSWORD: neighborhealth
      POSTGRES_DB: neighborhealth
    ports:
      - "5432:5432"
    volumes:
      - nh_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neighborhealth -d neighborhealth"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://neighborhealth:neighborhealth@db:5432/neighborhealth
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    command: >
      sh -c "test -d node_modules/next || npm ci &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  nh_pgdata:
